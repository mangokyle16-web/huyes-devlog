<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>Huyes 採集指揮台</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #0f1117;
    color: #e8eaf6;
    font-family: -apple-system, system-ui, sans-serif;
    max-width: 480px;
    margin: 0 auto;
    padding: 16px;
  }
  h1 { font-size: 18px; font-weight: 600; color: #a5d6a7; margin-bottom: 4px; }
  .subtitle { font-size: 12px; color: #78909c; margin-bottom: 16px; }

  .card { background: #1a1d27; border-radius: 12px; padding: 16px; margin-bottom: 12px; }
  .tab-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 12px; }
  .tab-btn {
    border: 1px solid #37474f; border-radius: 10px; background: #0f1117;
    color: #78909c; padding: 10px; font-size: 14px; font-weight: 700;
  }
  .tab-btn.active { border-color: #66bb6a; background: #1a2e1a; color: #a5d6a7; }

  .status-row { display: flex; align-items: center; gap: 8px; margin-bottom: 12px; }
  .dot { width: 10px; height: 10px; border-radius: 50%; background: #546e7a; }
  .dot.running { background: #66bb6a; box-shadow: 0 0 6px #66bb6a; }
  .status-label { font-size: 15px; font-weight: 500; }

  .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .stat { background: #0f1117; border-radius: 8px; padding: 10px 12px; }
  .stat-val { font-size: 24px; font-weight: 700; color: #a5d6a7; line-height: 1.1; }
  .stat-key { font-size: 11px; color: #78909c; margin-top: 2px; }

  .btn {
    width: 100%; padding: 16px; border: none; border-radius: 12px;
    font-size: 17px; font-weight: 600; cursor: pointer; transition: opacity 0.15s;
  }
  .btn:active { opacity: 0.7; }
  .btn-start { background: #388e3c; color: #fff; margin-bottom: 12px; }
  .btn-stop  { background: #b71c1c; color: #fff; margin-bottom: 12px; }

  /* Bean type toggle */
  .toggle-row {
    display: flex; gap: 8px; margin-bottom: 12px;
  }
  .toggle-btn {
    flex: 1; padding: 10px; border: 2px solid #37474f; border-radius: 8px;
    background: #0f1117; color: #78909c; font-size: 14px; font-weight: 600;
    cursor: pointer; text-align: center; transition: all 0.15s;
  }
  .toggle-btn.active-green { border-color: #66bb6a; color: #66bb6a; background: #1a2e1a; }
  .toggle-btn.active-roast { border-color: #ffb74d; color: #ffb74d; background: #2e251a; }

  .section-title {
    font-size: 11px; text-transform: uppercase; letter-spacing: 0.08em;
    color: #546e7a; margin-bottom: 10px;
  }
  .param-row {
    display: flex; align-items: center; justify-content: space-between;
    padding: 8px 0; border-bottom: 1px solid #1e2130;
  }
  .param-row:last-child { border-bottom: none; }
  .param-label { font-size: 13px; color: #b0bec5; }
  .param-note { color: #78909c; font-size: 11px; margin-top: 4px; }
  select, input[type=number], input[type=text], input[type=date] {
    background: #0f1117; color: #e8eaf6; border: 1px solid #37474f;
    border-radius: 6px; padding: 6px 8px; font-size: 13px;
    width: 148px; text-align: right;
  }
  input[type=date] { color-scheme: dark; }
  .hidden { display: none; }
  .count-hero { text-align: center; }
  .count-number { color: #a5d6a7; font-size: 64px; font-weight: 800; line-height: 1; }
  .count-subline { color: #78909c; font-size: 12px; margin-top: 8px; }
  #throughput-chart {
    display: block; width: 100%; height: 120px; background: #0f1117;
    border-radius: 8px;
  }
  .batch-list { display: grid; gap: 8px; }
  .batch-item {
    background: #0f1117; border-radius: 8px; padding: 10px 12px;
    display: grid; gap: 4px;
  }
  .batch-top { display: flex; justify-content: space-between; gap: 8px; font-size: 13px; color: #e8eaf6; }
  .batch-id { overflow-wrap: anywhere; }
  .batch-count { color: #a5d6a7; font-weight: 700; white-space: nowrap; }
  .batch-meta { color: #78909c; font-size: 11px; }

  .log-lines {
    font-family: monospace; font-size: 11px; color: #78909c;
    line-height: 1.6; max-height: 160px; overflow-y: auto;
  }
  .log-line { padding: 1px 0; }
  .log-line.ok     { color: #81c784; }
  .log-line.warn   { color: #ffb74d; }
  .log-line.detect { color: #4dd0e1; }
</style>
</head>
<body>

<h1>🌿 Huyes 採集指揮台</h1>
<p class="subtitle">Pi5 多光譜豆子採集控制</p>

<div class="tab-row">
  <button class="tab-btn active" id="tab-control" onclick="setTab('control')">控制</button>
  <button class="tab-btn" id="tab-count" onclick="setTab('count')">計數</button>
</div>

<div id="panel-control">
<!-- Status -->
<div class="card">
  <div class="status-row">
    <div class="dot" id="dot"></div>
    <span class="status-label" id="status-label">載入中...</span>
  </div>
  <div class="stat-grid">
    <div class="stat">
      <div class="stat-val" id="total-beans">—</div>
      <div class="stat-key">累計豆子</div>
    </div>
    <div class="stat">
      <div class="stat-val" id="frame-count">—</div>
      <div class="stat-key">目前幀</div>
    </div>
  </div>
</div>

<!-- Control buttons -->
<button class="btn btn-start" id="btn-start" onclick="startCapture()">▶ 開始採集</button>
<button class="btn btn-stop"  id="btn-stop"  onclick="stopCapture()" style="display:none">⏸ 暫停採集</button>

<!-- Metadata form -->
<div class="card">
  <div class="section-title">豆子資訊</div>

  <!-- 採集模式 -->
  <div class="toggle-row" style="margin-bottom:8px">
    <div class="toggle-btn active-green" id="btn-mode-img"   onclick="setMode('image')"   style="font-size:13px">📷 存圖模式</div>
    <div class="toggle-btn"              id="btn-mode-spec"  onclick="setMode('spectral')" style="font-size:13px">🌿 光譜模式</div>
  </div>

  <!-- Bean type toggle -->
  <div class="toggle-row">
    <div class="toggle-btn active-green" id="btn-green" onclick="setBeanType('green')">🌱 生豆</div>
    <div class="toggle-btn" id="btn-roast" onclick="setBeanType('roast')">☕ 烘培豆</div>
  </div>

  <div class="param-row">
    <span class="param-label">產地 Origin</span>
    <input type="text" id="param-origin" placeholder="e.g. 台灣阿里山">
  </div>
  <div class="param-row">
    <span class="param-label">處理法 Process</span>
    <select id="param-process">
      <option value="washed">水洗 Washed</option>
      <option value="natural">日曬 Natural</option>
      <option value="honey">蜜處理 Honey</option>
      <option value="wet_hulled">濕剝 Wet-hulled</option>
      <option value="anaerobic">厭氧 Anaerobic</option>
      <option value="other">其他 Other</option>
    </select>
  </div>
  <!-- Roast level: only for roasted beans -->
  <div class="param-row" id="row-roast">
    <span class="param-label">烘焙程度 Roast</span>
    <select id="param-roast">
      <option value="light">淺焙 Light</option>
      <option value="medium_light">中淺焙 Medium-Light</option>
      <option value="medium">中焙 Medium</option>
      <option value="medium_dark">中深焙 Medium-Dark</option>
      <option value="dark">深焙 Dark</option>
    </select>
  </div>
  <div class="param-row" id="row-roast-date">
    <div>
      <span class="param-label">烘焙日期 Roast Date</span>
      <div class="param-note" id="roast-days">烘焙後 — 天</div>
    </div>
    <input type="date" id="param-roast-date">
  </div>
  <div class="param-row">
    <span class="param-label">批次 Batch ID</span>
    <input type="text" id="param-batch" placeholder="e.g. 20260606-001">
  </div>
  <div class="param-row">
    <span class="param-label">日期 Date</span>
    <input type="date" id="param-date">
  </div>
</div>

<!-- Log -->
<div class="card">
  <div class="section-title">最近 log</div>
  <div class="log-lines" id="log-lines">—</div>
</div>
</div>

<div id="panel-count" class="hidden">
  <div class="card count-hero">
    <div class="section-title">即時計數</div>
    <div class="count-number" id="count-total">—</div>
    <div class="count-subline" id="count-subline">等待計數狀態...</div>
  </div>

  <div class="card">
    <div class="stat-grid">
      <div class="stat">
        <div class="stat-val" id="count-live-tracks">—</div>
        <div class="stat-key">畫面追蹤</div>
      </div>
      <div class="stat">
        <div class="stat-val" id="count-fps">—</div>
        <div class="stat-key">FPS</div>
      </div>
      <div class="stat">
        <div class="stat-val" id="count-throughput">—</div>
        <div class="stat-key">豆 / 分鐘</div>
      </div>
      <div class="stat">
        <div class="stat-val" id="count-speed">—</div>
        <div class="stat-key">px / 秒</div>
      </div>
    </div>
  </div>

  <div class="card">
    <div class="section-title">Throughput 最近 60 秒</div>
    <canvas id="throughput-chart" width="448" height="120"></canvas>
  </div>

  <div class="card">
    <div class="section-title">最近批次</div>
    <div class="batch-list" id="batch-list">—</div>
  </div>
</div>

<script>
let beanType = 'green';
let captureMode = 'image';
let currentTab = 'control';
const throughputSamples = [];

function setTab(tab) {
  currentTab = tab;
  document.getElementById('tab-control').className = 'tab-btn' + (tab === 'control' ? ' active' : '');
  document.getElementById('tab-count').className = 'tab-btn' + (tab === 'count' ? ' active' : '');
  document.getElementById('panel-control').className = tab === 'control' ? '' : 'hidden';
  document.getElementById('panel-count').className = tab === 'count' ? '' : 'hidden';
  if (tab === 'count') {
    drawThroughputChart();
  }
}

function setMode(mode) {
  captureMode = mode;
  document.getElementById('btn-mode-img').className  = 'toggle-btn' + (mode==='image'    ? ' active-green' : '');
  document.getElementById('btn-mode-spec').className = 'toggle-btn' + (mode==='spectral' ? ' active-green' : '');
}

// Set today's date as default
document.getElementById('param-date').value = new Date().toISOString().split('T')[0];
// Auto-generate batch ID
document.getElementById('param-batch').value = new Date().toISOString().slice(0,10).replace(/-/g,'') + '-001';

function setBeanType(type) {
  beanType = type;
  document.getElementById('btn-green').className = 'toggle-btn' + (type==='green' ? ' active-green' : '');
  document.getElementById('btn-roast').className = 'toggle-btn' + (type==='roast' ? ' active-roast' : '');
  document.getElementById('row-roast').style.display = type === 'roast' ? 'flex' : 'none';
  document.getElementById('row-roast-date').style.display = type === 'roast' ? 'flex' : 'none';
  updateRoastDays();
}
// Init: hide roast row for green beans
document.getElementById('row-roast').style.display = 'none';
document.getElementById('row-roast-date').style.display = 'none';

function parseDateInput(value) {
  if (!value) return null;
  const parts = value.split('-').map(Number);
  if (parts.length !== 3 || parts.some(n => !Number.isFinite(n))) return null;
  return new Date(parts[0], parts[1] - 1, parts[2]);
}

function updateRoastDays() {
  const el = document.getElementById('roast-days');
  if (beanType !== 'roast') {
    el.textContent = '';
    return;
  }
  const captureValue = document.getElementById('param-date').value || new Date().toISOString().split('T')[0];
  const roastValue = document.getElementById('param-roast-date').value;
  const captureDate = parseDateInput(captureValue);
  const roastDate = parseDateInput(roastValue);
  if (!captureDate || !roastDate) {
    el.textContent = '烘焙後 — 天';
    return;
  }
  const days = Math.round((captureDate - roastDate) / 86400000);
  el.textContent = '烘焙後 ' + days + ' 天';
}
document.getElementById('param-date').addEventListener('change', updateRoastDays);
document.getElementById('param-roast-date').addEventListener('change', updateRoastDays);

function colorLine(line) {
  if (line.includes('[detect]'))  return 'detect';
  if (line.includes('[OK]') || line.includes('done')) return 'ok';
  if (line.includes('WARN') || line.includes('ERROR')) return 'warn';
  return '';
}
function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function fmtNumber(v, digits=0) {
  const n = Number(v);
  if (!Number.isFinite(n)) return '—';
  return n.toLocaleString('zh-TW', { maximumFractionDigits: digits, minimumFractionDigits: digits });
}

function fmtAge(age) {
  const n = Number(age);
  if (!Number.isFinite(n)) return '';
  return ' · ' + n.toFixed(1) + 's 前';
}

function drawThroughputChart() {
  const canvas = document.getElementById('throughput-chart');
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  const w = canvas.width;
  const h = canvas.height;
  ctx.clearRect(0, 0, w, h);
  ctx.fillStyle = '#0f1117';
  ctx.fillRect(0, 0, w, h);
  ctx.strokeStyle = '#1e2130';
  ctx.lineWidth = 1;
  for (let i = 1; i < 4; i++) {
    const y = Math.round((h / 4) * i) + 0.5;
    ctx.beginPath();
    ctx.moveTo(0, y);
    ctx.lineTo(w, y);
    ctx.stroke();
  }
  if (throughputSamples.length < 2) return;
  const maxVal = Math.max(10, ...throughputSamples.map(s => s.value));
  const pad = 8;
  ctx.strokeStyle = '#66bb6a';
  ctx.lineWidth = 2;
  ctx.beginPath();
  throughputSamples.forEach((sample, i) => {
    const x = throughputSamples.length === 1
      ? pad
      : pad + (i / (throughputSamples.length - 1)) * (w - pad * 2);
    const y = h - pad - (sample.value / maxVal) * (h - pad * 2);
    if (i === 0) ctx.moveTo(x, y);
    else ctx.lineTo(x, y);
  });
  ctx.stroke();
}

function updateCountDisplay(response) {
  const data = response.data || {};
  const available = response.available !== false && response.ok !== false;
  const stale = !!response.stale;
  document.getElementById('count-total').textContent = fmtNumber(data.total_crossed);
  document.getElementById('count-live-tracks').textContent = fmtNumber(data.live_tracks);
  document.getElementById('count-fps').textContent = fmtNumber(data.fps, 1);
  document.getElementById('count-throughput').textContent = fmtNumber(data.throughput_per_min, 1);
  document.getElementById('count-speed').textContent = fmtNumber(data.belt_speed_px_s, 1);

  const batch = data.batch_id ? ' · ' + data.batch_id : '';
  const state = !available ? '等待計數狀態' : stale ? '計數狀態已逾時' : (data.running ? '即時更新中' : '未採集');
  document.getElementById('count-subline').textContent = state + batch + fmtAge(response.age_s);

  const throughput = Number(data.throughput_per_min || 0);
  throughputSamples.push({ t: Date.now(), value: Number.isFinite(throughput) ? throughput : 0 });
  while (throughputSamples.length > 60) throughputSamples.shift();
  drawThroughputChart();
}

async function refreshCount() {
  try {
    const r = await fetch('/api/count');
    const d = await r.json();
    updateCountDisplay(d);
  } catch(e) {
    updateCountDisplay({ ok: false, available: false, stale: true, age_s: null, data: {} });
  }
}

async function refreshBatches() {
  const batchEl = document.getElementById('batch-list');
  try {
    const r = await fetch('/api/batches?limit=50');
    const d = await r.json();
    const batches = d.batches || [];
    if (!batches.length) {
      batchEl.textContent = '尚無批次';
      return;
    }
    batchEl.innerHTML = batches.map(b => {
      const count = b.total_crossed ?? b.total_beans ?? 0;
      const frames = b.frame_count ?? b.frames ?? 0;
      const saved = b.saved_at || (b.mtime ? new Date(b.mtime * 1000).toLocaleString('zh-TW') : '');
      return '<div class="batch-item">' +
        '<div class="batch-top"><span class="batch-id">' + escHtml(b.batch_id || b.file || 'batch') + '</span>' +
        '<span class="batch-count">' + fmtNumber(count) + ' 豆</span></div>' +
        '<div class="batch-meta">' + fmtNumber(frames) + ' frames · ' + escHtml(saved) + '</div>' +
      '</div>';
    }).join('');
  } catch(e) {
    batchEl.textContent = '批次讀取失敗';
  }
}

async function refresh() {
  try {
    const r = await fetch('/api/status');
    const d = await r.json();
    const running = d.running;
    document.getElementById('dot').className = 'dot' + (running ? ' running' : '');
    document.getElementById('status-label').textContent = running ? '● 採集中' : '○ 已停止';
    document.getElementById('btn-start').style.display = running ? 'none' : 'block';
    document.getElementById('btn-stop').style.display  = running ? 'block' : 'none';
    document.getElementById('total-beans').textContent = d.total_beans ?? '—';
    const detects = (d.recent_log || []).filter(l => l.includes('[detect]'));
    if (detects.length) {
      const m = detects[detects.length-1].match(/frame=(\d+)/);
      if (m) document.getElementById('frame-count').textContent = '#' + m[1];
    }
    const logEl = document.getElementById('log-lines');
    logEl.innerHTML = (d.recent_log || []).map(l =>
      '<div class="log-line ' + colorLine(l) + '">' + escHtml(l) + '</div>'
    ).join('');
    logEl.scrollTop = logEl.scrollHeight;
  } catch(e) {
    document.getElementById('status-label').textContent = '連線失敗';
  }
}

async function startCapture() {
  const roastLevel = beanType === 'green' ? 'green' : document.getElementById('param-roast').value;
  const roastDate = beanType === 'green' ? '' : document.getElementById('param-roast-date').value;
  const body = {
    origin:      document.getElementById('param-origin').value  || 'unknown',
    process:     document.getElementById('param-process').value || 'unknown',
    roast_level: roastLevel,
    roast_date:  roastDate,
    batch_id:    document.getElementById('param-batch').value   || 'batch-001',
    capture_date: document.getElementById('param-date').value   || new Date().toISOString().split('T')[0],
    bean_type:   beanType,
    interval:    30,
    mode:        captureMode,
  };
  await fetch('/api/capture/start', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify(body),
  });
  await refresh();
}

async function stopCapture() {
  await fetch('/api/capture/stop', { method: 'POST' });
  await refresh();
  await refreshBatches();
}

refresh();
refreshCount();
refreshBatches();
setInterval(refresh, 3000);
setInterval(refreshCount, 1000);
</script>
</body>
</html>
